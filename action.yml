name: Assign reviewers for Bot PRs
description: Automatically assign reviewers to pull requests created by bots

inputs:
  token:
    description: "GitHub token (requires pull-requests: write permission)"
    required: true
  reviewers:
    description: "Reviewers to assign (comma-separated, supports both usernames and org/team)"
    required: true
  exclude-bots:
    description: "Bots to exclude (comma-separated, e.g. claude[bot])"
    required: false
    default: ""
  pr-number:
    description: "PR number to assign reviewers to. If omitted, uses context.payload.pull_request (requires pull_request event)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Assign reviewers if PR author is a Bot
      uses: actions/github-script@v9
      env:
        INPUT_REVIEWERS: ${{ inputs.reviewers }}
        INPUT_EXCLUDE_BOTS: ${{ inputs.exclude-bots }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          let pr = context.payload.pull_request;
          const inputPrNumber = (process.env.INPUT_PR_NUMBER || '').trim();

          if (!pr && inputPrNumber) {
            const prNumber = Number(inputPrNumber);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pr-number: "${inputPrNumber}" (must be a positive integer)`);
              return;
            }
            try {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              pr = data;
            } catch (error) {
              const msg = error instanceof Error ? error.message : String(error);
              core.setFailed(`Failed to fetch PR #${inputPrNumber}: ${msg}`);
              return;
            }
          }

          if (!pr) {
            core.warning('No pull_request in event payload and no pr-number input provided');
            return;
          }

          if (pr.user.type !== 'Bot') {
            core.info(`PR author "${pr.user.login}" is not a Bot, skipping`);
            return;
          }

          const excludeBots = (process.env.INPUT_EXCLUDE_BOTS || '')
            .split(',').map(s => s.trim()).filter(Boolean);

          if (excludeBots.includes(pr.user.login)) {
            core.info(`PR author "${pr.user.login}" is in the exclude list, skipping`);
            return;
          }

          const entries = (process.env.INPUT_REVIEWERS || '')
            .split(',').map(s => s.trim()).filter(Boolean);

          const validName = /^[A-Za-z0-9][A-Za-z0-9._-]*$/;
          const reviewers = [];
          const teamSlugs = [];
          for (const entry of entries) {
            if (entry.includes('/')) {
              const parts = entry.split('/');
              if (parts.length !== 2 || !validName.test(parts[0]) || !validName.test(parts[1])) {
                core.setFailed(`Invalid team entry: "${entry}" (expected "org/team-slug")`);
                return;
              }
              const [org, slug] = parts;
              if (org.toLowerCase() !== context.repo.owner.toLowerCase()) {
                core.setFailed(`Org "${org}" does not match repo owner "${context.repo.owner}"`);
                return;
              }
              teamSlugs.push(slug);
            } else {
              if (!validName.test(entry)) {
                core.setFailed(`Invalid reviewer username: "${entry}"`);
                return;
              }
              reviewers.push(entry);
            }
          }

          if (reviewers.length === 0 && teamSlugs.length === 0) {
            core.warning('No reviewers specified');
            return;
          }

          // Check for existing non-bot reviewer requests
          try {
            const { data: { users: requestedUsers, teams: requestedTeams } } = await github.rest.pulls.listRequestedReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const humanRequested = requestedUsers.filter(u => u.type !== 'Bot');
            const requestedTeamSlugs = requestedTeams.map(t => t.slug);

            if (humanRequested.length > 0 || requestedTeamSlugs.length > 0) {
              const parts = [];
              if (humanRequested.length > 0) parts.push(`users: ${humanRequested.map(u => u.login).join(', ')}`);
              if (requestedTeamSlugs.length > 0) parts.push(`teams: ${requestedTeamSlugs.join(', ')}`);
              core.info(`Non-bot reviewers already requested (${parts.join('; ')}). Skipping assignment.`);
              return;
            }
          } catch (error) {
            const msg = error instanceof Error ? error.message : String(error);
            core.warning(`Failed to check existing reviewers: ${msg}. Proceeding with assignment.`);
          }

          core.info(`Assigning reviewers to PR #${pr.number} by bot "${pr.user.login}"`);
          core.info(`  users: ${reviewers.join(', ') || '(none)'}`);
          core.info(`  teams: ${teamSlugs.join(', ') || '(none)'}`);

          try {
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              reviewers,
              team_reviewers: teamSlugs,
            });
          } catch (error) {
            const msg = error instanceof Error ? error.message : String(error);
            const status = error?.status ? ` (HTTP ${error.status})` : '';
            const details = error?.response?.data ? ` - ${JSON.stringify(error.response.data)}` : '';
            core.setFailed(`Failed to assign reviewers${status}: ${msg}${details}`);
            return;
          }

          core.info('Reviewers assigned successfully');
